[main]
font=IosevkaTerm:size=12:style=Extended, SFMono:size=14:style=Medium
font-size-adjustment=2.0
resize-delay-ms=1
resize-keep-grid=no

[key-bindings]
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+underscore Control+KP_Subtract
font-reset=Control+BackSpace Control+KP_0
noop=Control+v

[url]
label-letters=123456789ABCDEFGHIJKLMNO

[environment]
LESS_TERMCAP_so="[48;2;80;80;80m"
LESS_TERMCAP_se="[0m"

[csd]
size=0
border-width=8
border-color=000000
